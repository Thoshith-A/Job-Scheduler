# Flux — Distributed Job Scheduler. One command to run the whole system:
#   docker compose up --build
# Prove distribution across multiple workers:
#   docker compose up --build --scale worker=3
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: flux
      POSTGRES_PASSWORD: flux
      POSTGRES_DB: flux
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux -d flux"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build: { context: ., dockerfile: Dockerfile }
    command: ["pnpm", "--filter", "@flux/db", "db:migrate"]
    environment:
      DATABASE_URL: postgres://flux:flux@postgres:5432/flux
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build: { context: ., dockerfile: Dockerfile }
    command: ["node", "apps/api/dist/main.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://flux:flux@postgres:5432/flux
      REDIS_URL: redis://redis:6379
      API_PORT: "4000"
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports: ["4000:4000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  scheduler:
    build: { context: ., dockerfile: Dockerfile }
    command: ["node", "apps/scheduler/dist/main.js"]
    environment:
      DATABASE_URL: postgres://flux:flux@postgres:5432/flux
      REDIS_URL: redis://redis:6379
      SCHEDULER_SINGLETON_LOCK: "true"
    depends_on:
      migrate: { condition: service_completed_successfully }

  worker:
    build: { context: ., dockerfile: Dockerfile }
    command: ["node", "apps/worker/dist/main.js"]
    environment:
      DATABASE_URL: postgres://flux:flux@postgres:5432/flux
      REDIS_URL: redis://redis:6379
      WORKER_MAX_CONCURRENCY: "10"
    depends_on:
      migrate: { condition: service_completed_successfully }

  web:
    build: { context: ., dockerfile: Dockerfile }
    command: ["pnpm", "--filter", "@flux/web", "start"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    ports: ["3000:3000"]
    depends_on:
      api: { condition: service_started }

volumes:
  pgdata:
