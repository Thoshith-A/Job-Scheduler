name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Build packages
        run: |
          pnpm --filter @flux/shared build
          pnpm --filter @flux/db build
          pnpm --filter @flux/core build
          pnpm --filter @flux/infra build
          pnpm --filter @flux/testing build
      - name: Typecheck
        run: |
          pnpm --filter @flux/core typecheck
          pnpm --filter @flux/api typecheck
      - name: Concurrency proofs + unit tests (real embedded Postgres, no Docker)
        run: pnpm --filter @flux/core test
      - name: Worker + scheduler integration test
        run: pnpm --filter @flux/worker test
